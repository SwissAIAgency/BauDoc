<!DOCTYPE html>
<html lang="de-CH" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>VisiDoc – Galerie (Foto / Datum / Timeline)</title>
<style>
  :root {
    --bg-base:    #0f1720;
    --bg-panel:   #151f2b;
    --bg-raised:  #1c2938;
    --text-high:  #f3f6f9;
    --text-mid:   #aab7c4;
    --text-low:   #6b7a8a;
    --border:     #2c3b4d;
    --border-subtle: rgba(255,255,255,0.06);
    --primary:    #41b6c4;
    --primary-soft: rgba(65,182,196,0.16);
    --radius-container: 12px;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --topbar-h: 56px;
    --gal-tl-h: 36px;
    --shadow-tl: 0 -4px 16px rgba(0,0,0,0.28);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg-base);
    color: var(--text-high);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    /* Simuliert die App-Shell: links Sidebar, oben Topbar,
       Content scrollt intern. Die sticky-Timeline haengt
       am unteren Rand dieses Scroll-Containers. */
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: var(--topbar-h) 1fr;
    grid-template-areas:
      "sidebar topbar"
      "sidebar main";
    height: 100vh;
    overflow: hidden;
  }
  .vd-sidebar {
    grid-area: sidebar;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
  }
  .vd-sidebar-brand {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-5) var(--space-5);
    border-bottom: 1px solid var(--border-subtle);
    font-size: 18px; font-weight: 600;
  }
  .vd-sidebar-brand b { color: var(--primary); font-weight: 700; }
  .vd-sidebar-nav { padding: var(--space-4) var(--space-3); display: flex; flex-direction: column; gap: 2px; }
  .vd-nav-item {
    display: flex; align-items: center; gap: var(--space-3);
    height: 40px; padding: 0 var(--space-3);
    color: var(--text-mid);
    border-radius: 8px;
    font-weight: 500;
  }
  .vd-nav-item--active {
    color: var(--text-high);
    background: var(--primary-soft);
    box-shadow: inset 2px 0 0 var(--primary);
  }
  .vd-topbar {
    grid-area: topbar;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 var(--space-5);
    gap: var(--space-4);
  }
  .vd-topbar-title { font-size: 15px; font-weight: 500; color: var(--text-mid); }
  .vd-topbar-spacer { flex: 1; }
  .vd-topbar-cta {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0 var(--space-4);
    height: 36px;
    border-radius: 8px;
    font-weight: 500;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }

  .vd-main {
    grid-area: main;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg-base);
  }
  .vd-screen {
    max-width: 1600px;
    margin: 0 auto;
    padding: var(--space-3) var(--space-5) var(--space-5);
  }
  .vd-page-title { font-size: 18px; font-weight: 600; margin: 0 0 2px; }
  .vd-page-subtitle { font-size: 11.5px; color: var(--text-mid); margin: 0 0 var(--space-3); }

  /* ============================================================
     GALERIE – KOMPAKTES ZEILEN-LAYOUT
     Jede Zeile: 3 Fotos, darunter 3 Datum/Zeit-Stempel,
     darunter die zeileneigene sticky Timeline.
     ============================================================ */
  .vd-gal-rows {
    display: flex;
    flex-direction: column;
    /* Minimaler Gap, damit die vertikale Verbindungs-Linie der
       Marker moeglichst durchgehend wirkt. */
    gap: 4px;
    padding-bottom: var(--gal-tl-h);
  }
  .vd-gal-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .vd-gal-row-photos {
    display: grid;
    /* 5 fixe Slots pro Zeile (200px breit, 24px Abstand).
       Pro Zeile 3 reale Bilder + 2 Empty-Placeholder (ausser
       die letzte Zeile, die hat nur die echten Bilder).
       Boustrophedon-Layout: gerade Zeilen Bilder links,
       ungerade Zeilen Bilder rechts. Das wird per
       .vd-gal-row-photos--reverse grid-spalten-sortierung
       gemacht. */
    grid-template-columns: repeat(5, 200px);
    gap: 24px;
    justify-content: start;
  }
  /* Ungerade Zeilen (1, 3, ...) spiegeln die Reihenfolge:
     Bild 1 landet rechts, Bild 3 links. */
  .vd-gal-row-photos--reverse {
    grid-auto-flow: dense;
    /* Mit order:0/2/4/1/3 sortieren wir die Slots um. */
  }
  .vd-gal-row-photos--reverse > .vd-gal-cell:nth-child(1) { order: 5; }
  .vd-gal-row-photos--reverse > .vd-gal-cell:nth-child(2) { order: 4; }
  .vd-gal-row-photos--reverse > .vd-gal-cell:nth-child(3) { order: 3; }
  .vd-gal-row-photos--reverse > .vd-gal-cell--empty:nth-child(4)  { order: 1; }
  .vd-gal-row-photos--reverse > .vd-gal-cell--empty:nth-child(5)  { order: 2; }
  @media (max-width: 1100px) { .vd-gal-row-photos { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px)  { .vd-gal-row-photos { grid-template-columns: repeat(2, 1fr); } }

  .vd-gal-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
  }
  .vd-gal-cell-thumb {
    /* 1:1 wie die echte App (.vd-pd-card in index.html) */
    position: relative;
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, #2A2F35 0%, #1F2429 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-container);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 120ms ease, transform 120ms ease;
  }
  .vd-gal-cell-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .vd-gal-cell:hover .vd-gal-cell-thumb {
    border-color: var(--primary);
    transform: translateY(-1px);
  }
  .vd-gal-cell--selected .vd-gal-cell-thumb {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-soft);
  }
  .vd-gal-cell-thumb--a { background: linear-gradient(135deg, #5a4f3a 0%, #3a342a 50%, #1f1c14 100%); }
  .vd-gal-cell-thumb--b { background: linear-gradient(135deg, #4a5258 0%, #2a2f35 50%, #14181b 100%); }
  .vd-gal-cell-thumb--c { background: linear-gradient(135deg, #2f4a3a 0%, #1a3326 50%, #0f1f17 100%); }
  .vd-gal-cell-thumb--plan { background: linear-gradient(135deg, #3a4a5a 0%, #253545 50%, #14202b 100%); }
  .vd-gal-cell-thumb--video { background: linear-gradient(135deg, #4a3a4f 0%, #2f2535 50%, #1a1320 100%); }

  /* Empty-Placeholder fuer leere Slots im 5-Spalten-Grid.
     Sieht aus wie eine leere Karte, aber ohne Bildinhalt und
     ohne Stempel. Macht den Lesefluss im Boustrophedon sichtbar:
     Zeile 1: Bilder links, Empty-Slots rechts.
     Zeile 2: Bilder rechts, Empty-Slots links.
     Zeile 3: nur Bilder (rechts keine Slots). */
  .vd-gal-cell--empty {
    aspect-ratio: 4 / 3;
    border: 2px solid #ffffff;
    border-radius: var(--radius-container);
    background: transparent;
  }

  .vd-gal-cell-badge {
    position: absolute; top: 5px; right: 5px;
    width: 18px; height: 18px;
    border-radius: 5px;
    display: grid; place-items: center;
    background: rgba(20,24,27,0.7);
    color: #fff;
    font-size: 9px;
    backdrop-filter: blur(4px);
  }
  .vd-gal-cell-badge--video { background: rgba(91,141,239,0.85); }
  .vd-gal-cell-badge--plan  { background: rgba(102,128,72,0.85); }
  .vd-gal-cell-status {
    position: absolute; top: 5px; left: 5px;
    height: 16px; padding: 0 6px;
    display: inline-flex; align-items: center;
    background: rgba(20,24,27,0.75);
    color: var(--text-high);
    font-size: 9px; font-weight: 500;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .vd-gal-cell-status--warn { background: rgba(245,199,104,0.18); color: #f5c768; }
  .vd-gal-cell-status--ok   { background: var(--primary-soft); color: var(--primary); }
  .vd-gal-cell-stamp {
    /* Stempel (Datum + Zeit) zentriert unter dem Bild, damit
       der Punkt auf der Timeline darunter exakt mittig zur
       Bildmitte sitzt. */
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }
  .vd-gal-stamp-date {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 600; color: var(--text-high);
  }
  .vd-gal-stamp-time {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10.5px; color: var(--text-mid);
  }

  /* ============================================================
     ZEILEN-TIMELINE – dünne Linie, sticky am unteren Rand
     ============================================================ */
  .vd-gal-row-timeline {
    position: sticky;
    bottom: 0;
    z-index: 5;
    /* Nur ein duenner Strich, keine Box drumherum. */
    background: transparent;
    padding: 14px var(--space-3) 8px;
  }
  .vd-gal-row-timeline-eyebrow { display: none; }

  .vd-gal-row-timeline-grid {
    position: relative;
    display: grid;
    /* 5 Marker-Slots passend zu den 5 Card-Slots im Photo-Grid.
       Boustrophedon-Sortierung läuft synchron mit dem Photo-Grid
       (gleiche .vd-gal-row-photos--reverse Logik). */
    grid-template-columns: repeat(5, 200px);
    gap: 24px;
    align-items: end;
  }
  /* Marker der ungeraden Zeile ebenfalls spiegeln, damit Punkt
     immer genau unter der Bildmitte sitzt. */
  .vd-gal-row-timeline-grid--reverse > .vd-gal-tl-marker:nth-child(1) { order: 5; }
  .vd-gal-row-timeline-grid--reverse > .vd-gal-tl-marker:nth-child(2) { order: 4; }
  .vd-gal-row-timeline-grid--reverse > .vd-gal-tl-marker:nth-child(3) { order: 3; }
  /* Auch die Vertikal-Verbindungs-Linie muss in den ungeraden
     Zeilen am letzten Slot (visuell rechts nach dem Spiegeln)
     abgebrochen werden. Das uebernimmt .vd-gal-tl-marker--no-tail
     per JS. */
  @media (max-width: 1100px) { .vd-gal-row-timeline-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px)  { .vd-gal-row-timeline-grid { grid-template-columns: repeat(2, 1fr); } }
  .vd-gal-row-timeline-grid::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 1px;
    background: var(--border);
  }

  .vd-gal-tl-marker {
    position: relative;
    /* Marker ist ein anonymer Container, der genau unter dem
       Card-Stempel sitzt. Nur der Punkt (::before) und die
       vertikale Verbindungs-Linie (::after) sind sichtbar.
       Kein Datum/Zeit-Label mehr – das steht bereits unter
       dem Bild selbst. */
    width: 100%;
    height: 0;
    cursor: pointer;
  }
  .vd-gal-tl-marker::before {
    content: "";
    position: absolute;
    top: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-mid);
    box-shadow: 0 0 0 2px var(--bg-panel);
    transition: background 120ms ease, transform 120ms ease;
  }
  /* Marker hat keine eigene Vertikallinie mehr. Die Verbindung
     zwischen den Zeilen wird als eigene ".vd-gal-row-connector"-
     Linie pro Zeile gerendert, und zwar NUR am Rand, wo die
     Boustrophedon-Leserichtung endet. Bei normaler Leserichtung
     (L→R) am RECHTEN Rand (visuell letzter Marker = rechteste
     Spalte), bei reverse (R→L) am LINKEN Rand. */
  .vd-gal-tl-marker::after { display: none; }

  /* Sticky Timeline (Boustrophedon-Trick) */
  .vd-gal-row-timeline {
    position: sticky;
    bottom: 0;
    z-index: 5;
    background: transparent;
    padding: 14px var(--space-3) 8px;
  }

  /* Boustrophedon-Connector: ein eigenes Element, das direkt
     NACH der Timeline platziert wird (also zwischen zwei
     .vd-gal-row-Bloecken). Es ist NICHT sticky, also scrollt
     es mit dem Inhalt. Position: am visuell letzten Punkt
     der Zeile (= Mitte der rechten Spalte bei L→R, Mitte der
     linken Spalte bei R→L). Hoehe: vom Punkt abwaerts durch
     den Row-Gap (4px) + Stempel (~20px) + Card-Top (~50px)
     = ~80px. */
  .vd-gal-row-connector {
    position: relative;
    height: 80px;
    margin-top: -4px;     /* An den Row-Gap andocken */
    margin-bottom: -4px;
    pointer-events: none;
  }
  .vd-gal-row-connector::before {
    content: "";
    position: absolute;
    top: 0;
    left: var(--conn-x, 996px);
    width: 1px;
    height: 100%;
    background: var(--border);
  }
  /* Reverse Zeilen: Connector am linken Rand der Zeile (Spalte 1). */
  .vd-gal-row-connector--reverse {
    --conn-x: 100px;       /* Mitte der 1. Spalte (200/2 = 100) */
  }
  /* Normale Zeilen: Connector am rechten Rand (Spalte 5). */
  .vd-gal-row-connector--normal {
    --conn-x: 996px;       /* Mitte der 5. Spalte: 4*224 + 100 = 996 */
  }
  .vd-gal-tl-marker:hover::before { background: var(--text-high); transform: translateX(-50%) scale(1.3); }
  .vd-gal-tl-marker--active::before {
    background: var(--primary);
    box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 4px var(--primary-soft);
    transform: translateX(-50%);
  }
</style>
</head>
<body>
  <!-- App-Shell (Sidebar + Topbar) zur Demo des Kontexts -->
  <aside class="vd-sidebar" aria-label="Hauptnavigation">
    <div class="vd-sidebar-brand">
      <svg width="22" height="22" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round">
        <rect x="6" y="14" width="52" height="38" rx="3"/>
        <circle cx="44" cy="24" r="2.5" fill="currentColor"/>
        <path d="M12 44 L24 30 L34 38 L42 28 L52 44 Z" fill="currentColor"/>
      </svg>
      Visi<b>Doc</b>
    </div>
    <nav class="vd-sidebar-nav">
      <a class="vd-nav-item" href="#">Dashboard</a>
      <a class="vd-nav-item" href="#">Projekte</a>
      <a class="vd-nav-item vd-nav-item--active" href="#">Galerie</a>
      <a class="vd-nav-item" href="#">Archiv</a>
    </nav>
  </aside>

  <header class="vd-topbar" role="banner">
    <span class="vd-topbar-title">Galerie</span>
    <div class="vd-topbar-spacer"></div>
    <button class="vd-topbar-cta" type="button">+ Hochladen</button>
  </header>

  <main class="vd-main" id="vd-main">
    <div class="vd-screen">
      <h1 class="vd-page-title">Galerie</h1>
      <p class="vd-page-subtitle">36 Mandanten-Medien · 3 Zeilen à 3 Fotos · sticky Zeilen-Timeline</p>

      <div class="vd-gal-rows" id="vd-gal-rows"></div>
    </div>
  </main>

<script>
  // Mock-Daten: 13 Medien, verteilt auf 3 Zeilen mit 5 Slots.
  // In der echten App käme das aus MEDIA.filter(galMatches).
  // Die Bilder sind 1:1 aus assets/generated/ der index.html uebernommen.
  // Pro Zeile 5 Bilder (Slots 1-5), ausser die letzte Zeile (3 Bilder).
  // EXIF DateTimeOriginal als Quelle fuer Datum+Zeit (im Mockup
  // hardcoded; in der echten App aus dem EXIF-Block).
  const PHOTOS = [
    // Zeile 1 (neueste, 5 Bilder)
    { id: 'p1',  type: 'photo', img: 'betonwand-stahl-helm.jpg',     date: '13.06.2026', time: '09:14', name: 'Betonwand mit Stahl & Helm', status: 'warn', statusLabel: 'Hinweis' },
    { id: 'p2',  type: 'photo', img: 'beton-boden-platte.jpg',      date: '13.06.2026', time: '11:42', name: 'Beton · Bodenplatte' },
    { id: 'p3',  type: 'plan',  img: 'mauerwerk-kelle.jpg',          date: '13.06.2026', time: '14:05', name: 'Mauerwerk mit Kelle' },
    { id: 'p10', type: 'video', img: 'kran-sonnenuntergang.jpg',     date: '13.06.2026', time: '16:22', name: 'Kran · Sonnenuntergang',         duration: '01:08' },
    { id: 'p11', type: 'photo', img: 'elektro-verteiler.jpg',        date: '13.06.2026', time: '17:45', name: 'Elektro-Verteiler' },
    // Zeile 2 (5 Bilder, Boustrophedon-Leserichtung rechts→links)
    { id: 'p4',  type: 'photo', img: 'stahl-rahmen-werkhalle.jpg',   date: '06.06.2026', time: '07:30', name: 'Stahl-Rahmen Werkhalle' },
    { id: 'p5',  type: 'photo', img: 'holzdachstuhl-innen.jpg',      date: '06.06.2026', time: '08:22', name: 'Holzdachstuhl innen', status: 'ok', statusLabel: 'OK' },
    { id: 'p6',  type: 'video', img: 'holz-dachstuhl-werkstatt.jpg', date: '06.06.2026', time: '10:30', name: 'Dachstuhl Werkstatt · Zeitraffer', duration: '02:14' },
    { id: 'p7',  type: 'photo', img: 'dach-ziegel.jpg',              date: '06.06.2026', time: '15:48', name: 'Dachziegel' },
    { id: 'p12', type: 'photo', img: 'treppe-schweiss.jpg',          date: '06.06.2026', time: '17:05', name: 'Treppe · Schweissarbeit' },
    // Zeile 3 (aelteste, 3 Bilder, keine Empty rechts)
    { id: 'p8',  type: 'plan',  img: 'fassade-geruest-tram.jpg',     date: '20.05.2026', time: '09:00', name: 'Fassade · Gerüst Tram' },
    { id: 'p9',  type: 'photo', img: 'schulhaus-fassade-herbst.jpg', date: '20.05.2026', time: '11:15', name: 'Schulhaus Fassade Herbst' },
    { id: 'p13', type: 'video', img: 'sandstein-reinigung.jpg',      date: '20.05.2026', time: '16:30', name: 'Sandstein-Reinigung · Zeitraffer', duration: '00:48' },
  ];

  // Pro Zeile 5 Bilder (Slots 1-5). Letzte Zeile darf weniger
  // haben (z.B. 3 Bilder, dann 2 leere rechts).
  // Boustrophedon: ungerade Zeilen kehren die Reihenfolge um
  // (per CSS-Klasse vd-gal-row-photos--reverse, damit Punkt
  // exakt unter Bildmitte sitzt).
  const SLOTS_PER_ROW = 5;
  const PHOTOS_PER_ROW = 5;
  const root = document.getElementById('vd-gal-rows');

  // Rows bauen: pro Zeile ein Array von 5 Slots.
  // 0..2 = Bilder, 3..4 = Empty (ausser in der letzten Zeile).
  function buildRows() {
    const rows = [];
    for (let i = 0; i < PHOTOS.length; i += PHOTOS_PER_ROW) {
      const photos = PHOTOS.slice(i, i + PHOTOS_PER_ROW);
      const isLast = (i + PHOTOS_PER_ROW) >= PHOTOS.length;
      const slots = photos.slice(); // Bilder
      if (!isLast) {
        while (slots.length < SLOTS_PER_ROW) slots.push(null); // Empty
      }
      rows.push({ photos, slots, isLast, reverse: (rows.length % 2) === 1 });
    }
    return rows;
  }
  const rows = buildRows();

  function thumb(p) {
    if (p === null) {
      // Empty-Placeholder-Slot: nur weisser Rahmen, kein Stempel.
      return '<div class="vd-gal-cell vd-gal-cell--empty" aria-hidden="true"></div>';
    }
    const badge = p.type === 'video'
      ? '<div class="vd-gal-cell-badge vd-gal-cell-badge--video">▶</div>'
      : p.type === 'plan'
        ? '<div class="vd-gal-cell-badge vd-gal-cell-badge--plan">▦</div>'
        : '';
    const status = p.status
      ? `<span class="vd-gal-cell-status vd-gal-cell-status--${p.status}">${p.statusLabel}</span>`
      : '';
    const src = 'assets/generated/' + p.img;
    return `
      <div class="vd-gal-cell" data-id="${p.id}">
        <div class="vd-gal-cell-thumb">
          <img src="${src}" alt="${p.name}" loading="lazy">
          ${status}
          ${badge}
        </div>
        <div class="vd-gal-cell-stamp">
          <span class="vd-gal-stamp-date">${p.date}</span>
          <span class="vd-gal-stamp-time">${p.time} Uhr</span>
        </div>
      </div>
    `;
  }

  // Timeline-Grid: 5 Marker-Slots passend zum Photo-Grid.
  // Bei Empty-Photo-Slot wird kein Marker gerendert (kein Bild
  // drüber, also kein Punkt). Der visuell letzte Marker einer
  // Zeile bekommt no-tail (bei Boustrophedon der DOM-erste,
  // sonst der DOM-letzte), damit die Vertikallinie nicht ins
  // Leere läuft. (Die no-tail-Klasse ist aktuell ungenutzt, weil
  // die Vertikallinien jetzt als Connector-Element zwischen den
  // Zeilen gerendert werden, NICHT als Marker-::after.)
  function tlMarker(p, isVisuallyLast, idxInRow) {
    if (p === null) return '<div class="vd-gal-tl-marker vd-gal-tl-marker--empty" aria-hidden="true"></div>';
    return `
      <div class="vd-gal-tl-marker ${isVisuallyLast ? 'vd-gal-tl-marker--no-tail' : ''}" data-id="${p.id}" data-type="${p.type}" title="${p.name} — ${p.date} ${p.time}"></div>
    `;
  }

  // Connector-Linie: genau EINE pro Zeilenuebergang, am Rand wo
  // der Boustrophedon-Fluss endet. Reverse: linker Rand (Spalte 1).
  // Normal: rechter Rand (Spalte 5).
  function connector(reverse) {
    const cls = reverse ? 'vd-gal-row-connector vd-gal-row-connector--reverse' : 'vd-gal-row-connector vd-gal-row-connector--normal';
    return `<div class="${cls}" aria-hidden="true"></div>`;
  }

  // Rendert Rows + Connectors abwechselnd: Row, Connector, Row, Connector, Row.
  // Die letzte Zeile hat keinen nachfolgenden Connector.
  let html = '';
  rows.forEach((row, idx) => {
    const photoCls = row.reverse ? 'vd-gal-row-photos vd-gal-row-photos--reverse' : 'vd-gal-row-photos';
    const tlCls    = row.reverse ? 'vd-gal-row-timeline-grid vd-gal-row-timeline-grid--reverse' : 'vd-gal-row-timeline-grid';
    const rowCls   = 'vd-gal-row' + (row.reverse ? ' vd-gal-row--reverse' : '') + (row.isLast ? ' vd-gal-row--last' : '');
    const lastIdx  = row.reverse ? 0 : row.slots.length - 1;
    html += `
      <div class="${rowCls}" data-row="${idx}">
        <div class="${photoCls}">${row.slots.map(thumb).join('')}</div>
        <div class="vd-gal-row-timeline" data-row="${idx}">
          <div class="${tlCls}">${row.slots.map((p, i) => tlMarker(p, row.isLast && i === lastIdx, i)).join('')}</div>
        </div>
      </div>
    `;
    // Connector NACH der Zeile, ausser bei der letzten.
    if (!row.isLast) {
      // Connector-Seite: am Rand, wo die Leserichtung dieser
      // Zeile endet. Bei normal endet sie rechts, also Connector
      // rechts. Bei reverse endet sie links, also Connector links.
      html += connector(row.reverse);
    }
  });
  root.innerHTML = html;

  // Foto <-> Marker Interaktion
  root.querySelectorAll('.vd-gal-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      root.querySelectorAll('.vd-gal-cell').forEach(c => c.classList.remove('vd-gal-cell--selected'));
      cell.classList.add('vd-gal-cell--selected');
      const id = cell.dataset.id;
      root.querySelectorAll('.vd-gal-tl-marker').forEach(m => m.classList.remove('vd-gal-tl-marker--active'));
      const marker = root.querySelector(`.vd-gal-tl-marker[data-id="${id}"]`);
      if (marker) marker.classList.add('vd-gal-tl-marker--active');
    });
  });
  root.querySelectorAll('.vd-gal-tl-marker').forEach(marker => {
    marker.addEventListener('click', () => {
      root.querySelectorAll('.vd-gal-tl-marker').forEach(m => m.classList.remove('vd-gal-tl-marker--active'));
      marker.classList.add('vd-gal-tl-marker--active');
      const id = marker.dataset.id;
      const cell = root.querySelector(`.vd-gal-cell[data-id="${id}"]`);
      if (cell) {
        root.querySelectorAll('.vd-gal-cell').forEach(c => c.classList.remove('vd-gal-cell--selected'));
        cell.classList.add('vd-gal-cell--selected');
        cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  });
</script>
</body>
</html>
