    # ── Shared ────────────────────────────

    UserRole:
      type: string
      enum:
        - owner
        - admin
        - project_manager
        - site_manager
        - contractor
        - viewer
      description: |
        Rollen (hierarchisch):
        - owner: Organisationsinhaber
        - admin: Projekt-Administrator
        - project_manager: Projektleiter
        - site_manager: Bauleiter
        - contractor: Auftragnehmer (eingeschränkter Upload)
        - viewer: Nur Lesezugriff

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
